name: Fabrica Automatica de Vita

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Descargar el código del repositorio
    - name: Descargar codigo del usuario
      uses: actions/checkout@v4

    # Paso 2: Compilar asegurando que los archivos se guarden en la ruta compartida
    - name: Compilar VPK en entorno VitaSDK
      uses: addnab/docker-run-action@v3
      with:
        image: vitasdk/vitasdk:latest
        options: -v ${{ github.workspace }}:/workspace -w /workspace
        run: |
          echo "=== Compilando codigo fuente ==="
          arm-vita-eabi-gcc main.c -o /workspace/amongus.elf -lvita2d -lSceDisplay_stub -lSceGxm_stub -lSceSysmodule_stub -lSceCtrl_stub -lScePgf_stub -lm
          
          echo "=== Creando binarios firmados ==="
          vita-make-fself /workspace/amongus.elf /workspace/eboot.bin
          vita-mksfo "Among Us Vita Port" /workspace/param.sfo
          
          echo "=== Empaquetando instalador VPK ==="
          vita-pack-vpk -s /workspace/param.sfo -b /workspace/eboot.bin /workspace/amongus_2020.vpk
          echo "=== Proceso en contenedor finalizado ==="

    # Paso 3: Desbloquear los permisos del archivo creado por Docker
    - name: Liberar permisos del archivo VPK
      run: |
        echo "=== Modificando permisos de archivos creados ==="
        sudo chmod 777 ${{ github.workspace }}/amongus_2020.vpk || echo "El archivo no requiere cambios de permisos"

    # Paso 4: Subir el instalador final listo para descargar
    - name: Subir el instalador .VPK final
      uses: actions/upload-artifact@v4
      with:
        name: AmongUs_Vita_Instalador
        path: ${{ github.workspace }}/amongus_2020.vpk