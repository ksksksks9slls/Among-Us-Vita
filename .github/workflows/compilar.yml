name: Compilar VPK - Among Us Vita

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # lanzarlo a mano desde la pestaña Actions

# Evita builds duplicados si pusheas varias veces seguidas
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      # 1) Clona el repo de forma limpia
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # 2) Verifica que main.c exista antes de gastar tiempo en Docker
      - name: Comprobar fuentes
        run: |
          echo "==> Archivos en la raiz:"
          ls -la
          test -f main.c || { echo "ERROR: falta main.c en la raiz"; exit 1; }

      # 3) Compila TODO dentro del contenedor oficial de VitaSDK
      - name: Compilar dentro del contenedor VitaSDK
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -u $(id -u):$(id -g) \
            -w /workspace \
            -e HOME=/tmp \
            vitasdk/vitasdk:latest \
            /bin/bash -c '
              set -euo pipefail
              export VITASDK=/usr/local/vitasdk
              export PATH=$VITASDK/bin:$PATH

              echo "==> Version del toolchain:"
              arm-vita-eabi-gcc --version | head -n 1

              echo "==> [1/4] Compilando main.c -> amongus.elf"
              arm-vita-eabi-gcc main.c -o amongus.elf \
                -Wl,-q -Wall -O2 -std=c11 \
                -lvita2d \
                -lSceDisplay_stub -lSceGxm_stub -lSceSysmodule_stub \
                -lSceCtrl_stub -lScePgf_stub \
                -lSceCommonDialog_stub -lSceSysmem_stub \
                -lfreetype -lpng16 -ljpeg -lz \
                -lm -lc

              echo "==> [2/4] Convirtiendo ELF -> eboot.bin (unsafe, requiere heap grande)"
              vita-elf-create amongus.elf amongus.velf
              vita-make-fself amongus.velf eboot.bin

              echo "==> [3/4] Generando param.sfo"
              vita-mksfo "Among Us Vita Port" param.sfo

              echo "==> [4/4] Empaquetando VPK final"
              vita-pack-vpk -s param.sfo -b eboot.bin amongus_2020.vpk

              echo "==> Compilacion terminada OK"
            '

      # 4) Verifica que el VPK exista en la raíz del host
      - name: Verificar archivos generados
        run: |
          echo "==> Contenido de la raiz tras compilar:"
          ls -la
          test -f amongus_2020.vpk || { echo "ERROR: no se genero el VPK"; exit 1; }
          echo "==> Tamano del VPK:"
          du -h amongus_2020.vpk

      # 5) Sube el VPK a Artifacts
      - name: Subir artefacto VPK
        uses: actions/upload-artifact@v4
        with:
          name: amongus_2020-vpk
          path: amongus_2020.vpk
          if-no-files-found: error
          retention-days: 30

      # 6) (Opcional) sube tambien el ELF para depurar crashes
      - name: Subir ELF de depuracion
        uses: actions/upload-artifact@v4
        with:
          name: amongus-debug-elf
          path: amongus.elf
          if-no-files-found: warn
          retention-days: 7