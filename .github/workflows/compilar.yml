name: Fabrica Automatica de Vita

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Descargar tu código
    - name: Descargar codigo del usuario
      uses: actions/checkout@v4

    # Paso 2: Compilar usando Docker nativo de Linux
    # Forzamos al contenedor a correr con los mismos permisos de usuario (uid) de la máquina virtual
    # Así los archivos que cree pertenecerán a GitHub y se guardarán directamente en tu carpeta
    - name: Compilar VPK con Docker Nativo
      run: |
        docker run --rm -u $(id -u):$(id -g) -v "$PWD":/workspace -w /workspace vitasdk/vitasdk:latest sh -c "
          echo '=== Iniciando Compilacion Nativa ===' &&
          arm-vita-eabi-gcc main.c -o amongus.elf -lvita2d -lSceDisplay_stub -lSceGxm_stub -lSceSysmodule_stub -lSceCtrl_stub -lScePgf_stub -lm &&
          vita-make-fself amongus.elf eboot.bin &&
          vita-mksfo 'Among Us Vita Port' param.sfo &&
          vita-pack-vpk -s param.sfo -b eboot.bin amongus_2020.vpk &&
          echo '=== Archivos generados en la carpeta shared ==='
        "

    # Paso 3: Verificar físicamente si el archivo se creó en la máquina virtual antes de subirlo
    - name: Verificar existencia del VPK
      run: |
        echo "=== Comprobando archivos reales ==="
        ls -la
        if [ ! -f amongus_2020.vpk ]; then
          echo "ERROR: El empaquetador no dejó el archivo en la raíz del host."
          exit 1
        fi

    # Paso 4: Subir el instalador final listo para descargar
    - name: Subir el instalador .VPK final
      uses: actions/upload-artifact@v4
      with:
        name: AmongUs_Vita_Instalador
        path: amongus_2020.vpk