name: Fabrica Automatica de Vita

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del usuario
      uses: actions/checkout@v4

    - name: Instalar el compilador de PS Vita (VitaSDK)
      uses: vitasdk/vdpm-action@v2
      with:
        # Le decimos a la nube que instale vita2d para poder pintar el texto
        dependencies: |
          vita2dlib

    - name: Compilar el Port y empaquetar VPK
      run: |
        # Compilamos enlazando las librerías de gráficos y fuentes de la Vita
        arm-vita-eabi-gcc main.c -o amongus.elf -lvita2d -lSceDisplay_stub -lSceGxm_stub -lSceSysmodule_stub -lSceCtrl_stub -lScePgf_stub -lm
        
        # Convertimos el resultado en el ejecutable eboot.bin
        vita-make-fself amongus.elf eboot.bin
        
        # Creamos la información del juego (ID y Nombre de la burbuja)
        vita-mksfo "Among Us Vita Port" param.sfo
        
        # Lo metemos todo dentro del instalador .vpk
        vita-pack-vpk -s param.sfo -b eboot.bin amongus_2020.vpk

    - name: Subir el instalador .VPK final
      uses: actions/upload-artifact@v4
      with:
        name: AmongUs_Vita_Instalador
        path: amongus_2020.vpk